<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сбор информации из интернета</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* Стили из предыдущего сообщения (короткая версия) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d0d; color: #e8e8e8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { background: #1a1a1a; padding: 20px 28px; border-radius: 12px; border: 1px solid #2a2a2a; margin-bottom: 24px; }
        header h1 { color: #e8e8e8; font-size: 1.6rem; display: flex; align-items: center; gap: 12px; }
        header h1 i { color: #8b5cf6; }
        section { background: #1a1a1a; padding: 24px; border-radius: 12px; border: 1px solid #2a2a2a; margin-bottom: 20px; }
        section h2 { color: #e8e8e8; font-size: 1.2rem; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        section h2 i { color: #8b5cf6; }
        .input-group { display: flex; gap: 12px; margin-bottom: 16px; }
        #keywordInput { flex: 1; padding: 12px 18px; border: 2px solid #2a2a2a; border-radius: 12px; font-size: 1rem; background: #0d0d0d; color: #e8e8e8; }
        #keywordInput:focus { border-color: #8b5cf6; outline: none; }
        .btn-primary { padding: 12px 24px; background: linear-gradient(135deg, #8b5cf6, #a78bfa); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(139, 92, 246, 0.35); }
        .popular-keywords { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .popular-keywords span { color: #a0a0a0; font-size: 0.9rem; margin-right: 4px; }
        .keyword-chip { padding: 6px 16px; border: 1px solid #2a2a2a; border-radius: 20px; background: #0d0d0d; color: #a0a0a0; cursor: pointer; font-size: 0.85rem; }
        .keyword-chip:hover { background: #8b5cf6; color: white; border-color: #8b5cf6; }
        .url-list { display: flex; flex-direction: column; gap: 8px; }
        .url-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #0d0d0d; border-radius: 12px; border-left: 4px solid #8b5cf6; }
        .url-item .url-text { color: #e8e8e8; word-break: break-all; flex: 1; margin-right: 12px; font-size: 0.9rem; }
        .btn-download { padding: 6px 16px; background: linear-gradient(135deg, #8b5cf6, #a78bfa); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .btn-download:hover { transform: scale(1.05); }
        .download-progress { margin-top: 16px; padding: 16px 20px; background: #0d0d0d; border-radius: 12px; border: 1px solid #2a2a2a; }
        .progress-bar { width: 100%; height: 8px; background: #2a2a2a; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, #8b5cf6, #a78bfa); border-radius: 6px; transition: width 0.5s ease; }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: #a0a0a0; }
        .saved-list { display: flex; flex-direction: column; gap: 8px; }
        .saved-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #0d0d0d; border-radius: 12px; border-left: 4px solid #22c55e; cursor: pointer; }
        .saved-item .saved-info { flex: 1; }
        .saved-item .saved-title { font-weight: 500; color: #e8e8e8; font-size: 0.9rem; }
        .saved-item .saved-meta { font-size: 0.8rem; color: #666666; }
        .saved-item .saved-actions { display: flex; gap: 6px; }
        .btn-view { padding: 4px 12px; background: #2a2a2a; color: #a0a0a0; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-view:hover { background: #8b5cf6; color: white; }
        .btn-delete { padding: 4px 12px; background: #2a2a2a; color: #ef4444; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-delete:hover { background: #ef4444; color: white; }
        .saved-empty { color: #666666; text-align: center; padding: 40px 20px; }
        .content-viewer { margin-top: 8px; }
        .viewer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #2a2a2a; }
        .viewer-header h3 { color: #e8e8e8; display: flex; align-items: center; gap: 10px; }
        .btn-close { background: none; border: none; font-size: 1.4rem; color: #666666; cursor: pointer; }
        .btn-close:hover { color: #ef4444; }
        .content-display { background: #0d0d0d; padding: 16px 20px; border-radius: 12px; max-height: 500px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.9rem; white-space: pre-wrap; word-wrap: break-word; color: #e8e8e8; border: 1px solid #2a2a2a; }
        .notifications { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; max-width: 380px; width: 100%; }
        .notification { padding: 14px 18px; border-radius: 12px; background: #1a1a1a; border-left: 4px solid #8b5cf6; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); display: flex; align-items: center; gap: 12px; border: 1px solid #2a2a2a; animation: slideIn 0.3s ease; }
        .notification.success { border-left-color: #22c55e; }
        .notification.error { border-left-color: #ef4444; }
        .notification.warning { border-left-color: #f59e0b; }
        .notification i { font-size: 1.2rem; color: #8b5cf6; }
        .notification.success i { color: #22c55e; }
        .notification.error i { color: #ef4444; }
        .notification.warning i { color: #f59e0b; }
        .notification .notif-title { font-weight: 600; font-size: 0.9rem; color: #e8e8e8; }
        .notification .notif-text { font-size: 0.85rem; color: #a0a0a0; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .input-group { flex-direction: column; } .url-item { flex-direction: column; align-items: stretch; gap: 8px; } .saved-item { flex-direction: column; align-items: stretch; gap: 8px; } .popular-keywords { justify-content: center; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-globe"></i> Сбор информации из интернета</h1>
        </header>

        <main>
            <section class="search-section">
                <div class="input-group">
                    <input type="text" id="keywordInput" placeholder="Введите ключевое слово...">
                    <button id="searchBtn" class="btn-primary">
                        <i class="fas fa-search"></i> Поиск
                    </button>
                </div>
                <div class="popular-keywords">
                    <span>Популярные:</span>
                    <button class="keyword-chip" data-keyword="программирование">Программирование</button>
                    <button class="keyword-chip" data-keyword="новости">Новости</button>
                    <button class="keyword-chip" data-keyword="наука">Наука</button>
                    <button class="keyword-chip" data-keyword="история">История</button>
                    <button class="keyword-chip" data-keyword="машины">Машины</button>
                    <button class="keyword-chip" data-keyword="книги">Книги</button>
                    <button class="keyword-chip" data-keyword="политика">Политика</button>
                    <button class="keyword-chip" data-keyword="хобби">Хобби</button>
                    <button class="keyword-chip" data-keyword="одежда">Одежда</button>
                </div>
            </section>

            <section class="results-section" id="resultsSection" style="display: none;">
                <h2><i class="fas fa-link"></i> Найденные URL</h2>
                <div id="urlList" class="url-list"></div>
                <div id="downloadProgress" class="download-progress" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    <div class="progress-info">
                        <span id="progressText">Загрузка...</span>
                        <span id="progressSize">0 MB</span>
                    </div>
                </div>
            </section>

            <section class="saved-section">
                <h2><i class="fas fa-save"></i> Сохраненный контент</h2>
                <div id="savedList" class="saved-list"></div>
            </section>

            <section class="content-viewer" id="contentViewer" style="display: none;">
                <div class="viewer-header">
                    <h3><i class="fas fa-file-alt"></i> Просмотр контента</h3>
                    <button id="closeViewer" class="btn-close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div id="contentDisplay" class="content-display"></div>
            </section>
        </main>

        <div id="notifications" class="notifications"></div>
    </div>

    <script>
        // ===== ВЕСЬ JAVASCRIPT ПРЯМО ЗДЕСЬ =====
        class InternetCollector {
            constructor() {
                this.apiBase = window.location.origin;
                this.savedContent = this.loadFromLocalStorage();
                this.currentKeyword = '';
                this.currentUrls = [];
                this.isDownloading = false;

                this.init();
            }

            init() {
                this.keywordInput = document.getElementById('keywordInput');
                this.searchBtn = document.getElementById('searchBtn');
                this.resultsSection = document.getElementById('resultsSection');
                this.urlList = document.getElementById('urlList');
                this.savedList = document.getElementById('savedList');
                this.contentViewer = document.getElementById('contentViewer');
                this.contentDisplay = document.getElementById('contentDisplay');
                this.closeViewer = document.getElementById('closeViewer');
                this.progressFill = document.getElementById('progressFill');
                this.progressText = document.getElementById('progressText');
                this.progressSize = document.getElementById('progressSize');
                this.downloadProgress = document.getElementById('downloadProgress');

                this.searchBtn.addEventListener('click', () => this.handleSearch());
                this.keywordInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleSearch();
                });
                this.closeViewer.addEventListener('click', () => this.closeContentViewer());

                document.querySelectorAll('.keyword-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        this.keywordInput.value = chip.dataset.keyword;
                        this.handleSearch();
                    });
                });

                this.renderSavedContent();
            }

            async handleSearch() {
                const keyword = this.keywordInput.value.trim();
                if (!keyword) {
                    this.showNotification('Предупреждение', 'Введите ключевое слово', 'warning');
                    return;
                }

                this.currentKeyword = keyword;
                this.showNotification('Поиск', `Поиск по ключевому слову "${keyword}"...`, 'info');

                try {
                    const response = await fetch(`${this.apiBase}/api/urls/${encodeURIComponent(keyword)}`);

                    if (!response.ok) {
                        if (response.status === 404) {
                            throw new Error('Ключевое слово не найдено');
                        }
                        throw new Error('Ошибка при получении URL');
                    }

                    const data = await response.json();
                    this.currentUrls = data.urls;
                    this.renderUrls(data.urls);
                    this.resultsSection.style.display = 'block';

                    this.showNotification('Успех', `Найдено ${data.urls.length} URL`, 'success');
                } catch (error) {
                    this.showNotification('Ошибка', error.message, 'error');
                    this.resultsSection.style.display = 'none';
                }
            }

            renderUrls(urls) {
                this.urlList.innerHTML = '';

                if (!urls || urls.length === 0) {
                    this.urlList.innerHTML = '<div class="saved-empty">URL не найдены</div>';
                    return;
                }

                urls.forEach((url, index) => {
                    const item = document.createElement('div');
                    item.className = 'url-item';

                    const urlText = document.createElement('span');
                    urlText.className = 'url-text';
                    urlText.textContent = url;

                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'btn-download';
                    downloadBtn.innerHTML = '<i class="fas fa-download"></i> Скачать';
                    downloadBtn.dataset.url = url;
                    downloadBtn.dataset.index = index;
                    downloadBtn.addEventListener('click', () => this.downloadContent(url, downloadBtn));

                    item.appendChild(urlText);
                    item.appendChild(downloadBtn);
                    this.urlList.appendChild(item);
                });
            }

            async downloadContent(url, button) {
                if (this.isDownloading) {
                    this.showNotification('Предупреждение', 'Подождите завершения текущей загрузки', 'warning');
                    return;
                }

                this.isDownloading = true;
                button.disabled = true;
                button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Загрузка...';

                this.downloadProgress.style.display = 'block';
                this.progressFill.style.width = '0%';
                this.progressText.textContent = 'Начинаем загрузку...';
                this.progressSize.textContent = '0 MB';

                try {
                    let progress = 0;
                    const progressInterval = setInterval(() => {
                        progress += Math.random() * 15 + 5;
                        if (progress > 90) progress = 90;
                        this.progressFill.style.width = `${progress}%`;
                        this.progressText.textContent = `Загрузка... ${Math.round(progress)}%`;
                    }, 500);

                    const response = await fetch(`${this.apiBase}/api/download?url=${encodeURIComponent(url)}`);

                    clearInterval(progressInterval);

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || 'Ошибка при скачивании');
                    }

                    const data = await response.json();

                    this.progressFill.style.width = '100%';
                    this.progressText.textContent = 'Загрузка завершена!';
                    const sizeMB = (data.size / (1024 * 1024)).toFixed(2);
                    this.progressSize.textContent = `${sizeMB} MB`;

                    const savedItem = {
                        id: Date.now(),
                        url: data.url,
                        content: data.content,
                        size: data.size,
                        timestamp: data.timestamp,
                        keyword: this.currentKeyword
                    };

                    this.savedContent.push(savedItem);
                    this.saveToLocalStorage();
                    this.renderSavedContent();

                    this.showNotification('Успех', `Контент сохранен (${sizeMB} MB)`, 'success');

                    setTimeout(() => {
                        this.viewContent(savedItem.id);
                    }, 500);

                } catch (error) {
                    this.showNotification('Ошибка', error.message, 'error');
                    this.progressText.textContent = 'Ошибка загрузки';
                    this.progressFill.style.width = '0%';
                } finally {
                    this.isDownloading = false;
                    button.disabled = false;
                    button.innerHTML = '<i class="fas fa-download"></i> Скачать';

                    setTimeout(() => {
                        this.downloadProgress.style.display = 'none';
                    }, 3000);
                }
            }

            renderSavedContent() {
                this.savedList.innerHTML = '';

                if (this.savedContent.length === 0) {
                    this.savedList.innerHTML = '<div class="saved-empty">Нет сохраненного контента</div>';
                    return;
                }

                const sorted = [...this.savedContent].reverse();

                sorted.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'saved-item';

                    const info = document.createElement('div');
                    info.className = 'saved-info';

                    const title = document.createElement('div');
                    title.className = 'saved-title';
                    const displayUrl = item.url.length > 60 ? item.url.substring(0, 60) + '...' : item.url;
                    title.textContent = displayUrl;

                    const meta = document.createElement('div');
                    meta.className = 'saved-meta';
                    const sizeKB = (item.size / 1024).toFixed(1);
                    const date = new Date(item.timestamp);
                    const keyword = item.keyword || 'неизвестно';
                    meta.textContent = `${sizeKB} KB • ${date.toLocaleString()} • ${keyword}`;

                    info.appendChild(title);
                    info.appendChild(meta);

                    const actions = document.createElement('div');
                    actions.className = 'saved-actions';

                    const viewBtn = document.createElement('button');
                    viewBtn.className = 'btn-view';
                    viewBtn.innerHTML = '<i class="fas fa-eye"></i> Просмотр';
                    viewBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.viewContent(item.id);
                    });

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'btn-delete';
                    deleteBtn.innerHTML = '<i class="fas fa-trash"></i> Удалить';
                    deleteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.deleteContent(item.id);
                    });

                    actions.appendChild(viewBtn);
                    actions.appendChild(deleteBtn);

                    div.appendChild(info);
                    div.appendChild(actions);

                    div.addEventListener('click', () => this.viewContent(item.id));

                    this.savedList.appendChild(div);
                });
            }

            viewContent(id) {
                const item = this.savedContent.find(c => c.id === id);
                if (!item) {
                    this.showNotification('Ошибка', 'Контент не найден', 'error');
                    return;
                }

                this.contentDisplay.textContent = item.content;
                this.contentViewer.style.display = 'block';
                this.contentViewer.scrollIntoView({ behavior: 'smooth' });
            }

            closeContentViewer() {
                this.contentViewer.style.display = 'none';
            }

            deleteContent(id) {
                if (!confirm('Вы уверены, что хотите удалить этот контент?')) return;

                this.savedContent = this.savedContent.filter(c => c.id !== id);
                this.saveToLocalStorage();
                this.renderSavedContent();

                if (this.contentViewer.style.display !== 'none') {
                    this.closeContentViewer();
                }

                this.showNotification('Успех', 'Контент удален', 'success');
            }

            saveToLocalStorage() {
                try {
                    localStorage.setItem('internetCollectorContent', JSON.stringify(this.savedContent));
                } catch (error) {
                    console.error('Ошибка сохранения в LocalStorage:', error);
                }
            }

            loadFromLocalStorage() {
                try {
                    const data = localStorage.getItem('internetCollectorContent');
                    return data ? JSON.parse(data) : [];
                } catch (error) {
                    console.error('Ошибка загрузки из LocalStorage:', error);
                    return [];
                }
            }

            showNotification(title, message, type = 'info') {
                const container = document.getElementById('notifications');

                const notification = document.createElement('div');
                notification.className = `notification ${type}`;

                const iconMap = {
                    success: 'fa-check-circle',
                    error: 'fa-exclamation-circle',
                    warning: 'fa-exclamation-triangle',
                    info: 'fa-info-circle'
                };

                notification.innerHTML = `
                    <i class="fas ${iconMap[type] || iconMap.info}"></i>
                    <div>
                        <div class="notif-title">${title}</div>
                        <div class="notif-text">${message}</div>
                    </div>
                `;

                container.appendChild(notification);

                setTimeout(() => {
                    notification.style.opacity = '0';
                    notification.style.transform = 'translateX(100%)';
                    setTimeout(() => notification.remove(), 300);
                }, 5000);

                notification.addEventListener('click', () => {
                    notification.style.opacity = '0';
                    notification.style.transform = 'translateX(100%)';
                    setTimeout(() => notification.remove(), 300);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new InternetCollector();
        });
    </script>
</body>
</html>
