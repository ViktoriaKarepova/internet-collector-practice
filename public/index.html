<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сбор информации из интернета</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d0d0d;
            color: #e8e8e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            background: #1a1a1a;
            padding: 20px 28px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            margin-bottom: 24px;
        }
        header h1 {
            color: #e8e8e8;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 i {
            color: #8b5cf6;
        }
        section {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }
        section h2 {
            color: #e8e8e8;
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        section h2 i {
            color: #8b5cf6;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        #keywordInput {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #2a2a2a;
            border-radius: 12px;
            font-size: 1rem;
            background: #0d0d0d;
            color: #e8e8e8;
        }
        #keywordInput:focus {
            border-color: #8b5cf6;
            outline: none;
        }
        .btn-primary {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.35);
        }
        .popular-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .popular-keywords span {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-right: 4px;
        }
        .keyword-chip {
            padding: 6px 16px;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            background: #0d0d0d;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .keyword-chip:hover {
            background: #8b5cf6;
            color: white;
            border-color: #8b5cf6;
        }
        .url-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .url-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #0d0d0d;
            border-radius: 12px;
            border-left: 4px solid #8b5cf6;
        }
        .url-item .url-text {
            color: #e8e8e8;
            word-break: break-all;
            flex: 1;
            margin-right: 12px;
            font-size: 0.9rem;
        }
        .btn-download {
            padding: 6px 16px;
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-download:hover {
            transform: scale(1.05);
        }
        .download-progress {
            margin-top: 16px;
            padding: 16px 20px;
            background: #0d0d0d;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a2a2a;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #a0a0a0;
        }
        .saved-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .saved-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #0d0d0d;
            border-radius: 12px;
            border-left: 4px solid #22c55e;
            cursor: pointer;
        }
        .saved-item .saved-info {
            flex: 1;
        }
        .saved-item .saved-title {
            font-weight: 500;
            color: #e8e8e8;
            font-size: 0.9rem;
        }
        .saved-item .saved-meta {
            font-size: 0.8rem;
            color: #666666;
        }
        .saved-item .saved-actions {
            display: flex;
            gap: 6px;
        }
        .btn-view {
            padding: 4px 12px;
            background: #2a2a2a;
            color: #a0a0a0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-view:hover {
            background: #8b5cf6;
            color: white;
        }
        .btn-delete {
            padding: 4px 12px;
            background: #2a2a2a;
            color: #ef4444;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }
        .saved-empty {
            color: #666666;
            text-align: center;
            padding: 40px 20px;
        }
        .content-viewer {
            margin-top: 8px;
        }
        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a2a;
        }
        .viewer-header h3 {
            color: #e8e8e8;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-close {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #666666;
            cursor: pointer;
        }
        .btn-close:hover {
            color: #ef4444;
        }
        .content-display {
            background: #0d0d0d;
            padding: 16px 20px;
            border-radius: 12px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #e8e8e8;
            border: 1px solid #2a2a2a;
        }
        .notifications {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 380px;
            width: 100%;
        }
        .notification {
            padding: 14px 18px;
            border-radius: 12px;
            background: #1a1a1a;
            border-left: 4px solid #8b5cf6;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #2a2a2a;
        }
        .notification.success {
            border-left-color: #22c55e;
        }
        .notification.error {
            border-left-color: #ef4444;
        }
        .notification.warning {
            border-left-color: #f59e0b;
        }
        .notification i {
            font-size: 1.2rem;
            color: #8b5cf6;
        }
        .notification.success i {
            color: #22c55e;
        }
        .notification.error i {
            color: #ef4444;
        }
        .notification.warning i {
            color: #f59e0b;
        }
        .notification .notif-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #e8e8e8;
        }
        .notification .notif-text {
            font-size: 0.85rem;
            color: #a0a0a0;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notification {
            animation: slideIn 0.3s ease;
        }
        @media (max-width: 768px) {
            .input-group {
                flex-direction: column;
            }
            .url-item {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .saved-item {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .popular-keywords {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-globe"></i> Сбор информации из интернета</h1>
        </header>

        <main>
            <section class="search-section">
                <div class="input-group">
                    <input type="text" id="keywordInput" placeholder="Введите ключевое слово...">
                    <button id="searchBtn" class="btn-primary">
                        <i class="fas fa-search"></i> Поиск
                    </button>
                </div>
                <div class="popular-keywords">
                    <span>Популярные:</span>
                    <button class="keyword-chip" data-keyword="программирование">Программирование</button>
                    <button class="keyword-chip" data-keyword="новости">Новости</button>
                    <button class="keyword-chip" data-keyword="наука">Наука</button>
                    <button class="keyword-chip" data-keyword="история">История</button>
                    <button class="keyword-chip" data-keyword="машины">Машины</button>
                    <button class="keyword-chip" data-keyword="книги">Книги</button>
                    <button class="keyword-chip" data-keyword="политика">Политика</button>
                    <button class="keyword-chip" data-keyword="хобби">Хобби</button>
                    <button class="keyword-chip" data-keyword="одежда">Одежда</button>
                </div>
            </section>

            <section class="results-section" id="resultsSection" style="display: none;">
                <h2><i class="fas fa-link"></i> Найденные URL</h2>
                <div id="urlList" class="url-list"></div>
                <div id="downloadProgress" class="download-progress" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    <div class="progress-info">
                        <span id="progressText">Загрузка...</span>
                        <span id="progressSize">0 MB</span>
                    </div>
                </div>
            </section>

            <section class="saved-section">
                <h2><i class="fas fa-save"></i> Сохраненный контент</h2>
                <div id="savedList" class="saved-list"></div>
            </section>

            <section class="content-viewer" id="contentViewer" style="display: none;">
                <div class="viewer-header">
                    <h3><i class="fas fa-file-alt"></i> Просмотр контента</h3>
                    <button id="closeViewer" class="btn-close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div id="contentDisplay" class="content-display"></div>
            </section>
        </main>

        <div id="notifications" class="notifications"></div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
